<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>創意大師萬能筆 — 丸雄の物語</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#2a1a00;
  --ink2:#5a3a10;
  --paper:#f2e8d0;
  --paper2:#e8d8b0;
  --paper3:#d4c090;
  --red:#9b2020;
  --gold:#c9a84c;
  --gold2:#e8c96c;
  --blue:#1a3a5c;
  --green:#1a4a2a;
}
*{box-sizing:border-box;margin:0;padding:0}
html{
  min-height:100vh;
  background:#6b4f0a;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(0,0,0,0.04) 40px,rgba(0,0,0,0.04) 41px),
                   repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(0,0,0,0.04) 40px,rgba(0,0,0,0.04) 41px);
}
body{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:20px;font-family:'Noto Serif TC',serif}

#game{
  width:100%;max-width:800px;
  background:var(--paper);
  border:3px solid var(--ink);
  outline:1px solid var(--gold);
  outline-offset:-8px;
  box-shadow:8px 8px 0 rgba(42,26,0,0.5),16px 16px 0 rgba(42,26,0,0.2);
  position:relative;
}
.deco-top{
  height:10px;
  background:repeating-linear-gradient(90deg,
    var(--ink) 0,var(--ink) 14px,
    var(--red) 14px,var(--red) 16px,
    var(--gold) 16px,var(--gold) 18px,
    var(--red) 18px,var(--red) 20px,
    transparent 20px,transparent 32px);
}

/* ─── TITLE ─── */
#title-screen{
  padding:48px 28px 44px;
  background:var(--paper);
  text-align:center;
  position:relative;
}
.title-frame{
  position:absolute;inset:14px;
  border:1px solid var(--gold);
  pointer-events:none;
}
.title-frame::before{
  content:'';position:absolute;inset:5px;
  border:0.5px solid rgba(201,168,76,0.5);
}
.corner{position:absolute;font-size:18px;color:var(--gold);line-height:1}
.corner.tl{top:-2px;left:2px}
.corner.tr{top:-2px;right:2px;transform:scaleX(-1)}
.corner.bl{bottom:-2px;left:2px;transform:scaleY(-1)}
.corner.br{bottom:-2px;right:2px;transform:scale(-1)}

.pen-anim{font-size:64px;display:block;margin-bottom:10px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:rotate(-6deg) translateY(0)}50%{transform:rotate(4deg) translateY(-12px)}}

.title-zh{
  font-family:'Ma Shan Zheng',serif;
  font-size:46px;color:var(--ink);
  letter-spacing:0.22em;line-height:1.4;
  text-shadow:2px 3px 0 rgba(42,26,0,0.18);
  margin-bottom:6px;
}
.title-jp{
  font-family:'ZCOOL XiaoWei',serif;
  font-size:13px;color:var(--ink2);
  letter-spacing:0.35em;margin-bottom:0;
}
.divider{
  display:flex;align-items:center;gap:14px;
  margin:18px auto;max-width:380px;
}
.divider span{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.divider i{font-style:normal;font-size:18px;color:var(--gold)}

.title-story{
  font-family:'ZCOOL XiaoWei',serif;
  font-size:14px;color:var(--ink2);
  line-height:2.6;letter-spacing:0.14em;
  max-width:420px;margin:0 auto 30px;
  padding:16px 24px;
  background:rgba(201,168,76,0.07);
  border-top:1px solid rgba(201,168,76,0.6);
  border-bottom:1px solid rgba(201,168,76,0.6);
  text-align:left;
}
.title-story em{color:var(--red);font-style:normal;font-family:'Ma Shan Zheng',serif;font-size:15px}

.ink-btn{
  font-family:'Ma Shan Zheng',serif;
  font-size:16px;letter-spacing:0.22em;
  color:var(--paper);background:var(--ink);
  border:none;padding:13px 40px;cursor:pointer;
  position:relative;transition:all 0.12s;
  border-bottom:4px solid rgba(0,0,0,0.45);
  display:inline-block;
}
.ink-btn::before{content:'';position:absolute;inset:3px;border:1px solid rgba(255,255,255,0.12);pointer-events:none}
.ink-btn:hover{background:#3d2800}
.ink-btn:active{transform:translateY(2px);border-bottom-width:2px}
.ink-btn.red{background:var(--red);border-bottom-color:#5a0f0f}
.ink-btn.red:hover{background:#7a1818}
.ink-btn.blue{background:var(--blue);border-bottom-color:#0a1f35}
.ink-btn.blue:hover{background:#0e2744}
.ink-btn.green{background:var(--green);border-bottom-color:#0a2a14}
.ink-btn.dim{background:var(--ink2);border-bottom-color:#2a1800}

/* ─── STAGE SELECT ─── */
#stage-select{display:none;padding:24px}
.sec-title{
  font-family:'Ma Shan Zheng',serif;
  font-size:22px;color:var(--ink);
  letter-spacing:0.2em;
  border-bottom:2px solid var(--gold);
  padding-bottom:8px;margin-bottom:18px;
  display:flex;align-items:center;gap:12px;
}
.sec-title::before{content:'◈';color:var(--gold);font-size:16px}

.stage-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.stage-card{
  background:var(--paper2);
  border:1.5px solid var(--gold);
  padding:16px 10px 12px;
  text-align:center;cursor:pointer;
  position:relative;
  transition:all 0.15s;
  box-shadow:2px 2px 0 rgba(42,26,0,0.2);
}
.stage-card::after{content:'';position:absolute;inset:5px;border:0.5px solid rgba(201,168,76,0.35);pointer-events:none}
.stage-card:hover{background:var(--paper3);transform:translateY(-3px);box-shadow:5px 5px 0 rgba(42,26,0,0.25)}
.s-icon{font-size:34px;display:block;margin-bottom:7px}
.s-name{font-family:'Ma Shan Zheng',serif;font-size:15px;color:var(--ink);letter-spacing:0.12em}
.s-diff{font-family:'ZCOOL XiaoWei',serif;font-size:11px;color:var(--ink2);margin-top:5px;letter-spacing:0.1em}

/* ─── HUD ─── */
#hud{
  display:none;
  justify-content:space-between;align-items:center;
  padding:9px 20px;
  background:var(--ink);
  color:var(--paper2);
}
#hud .hud-item{font-family:'ZCOOL XiaoWei',serif;font-size:13px;letter-spacing:0.12em}
#hud strong{font-family:'Ma Shan Zheng',serif;font-size:16px;color:var(--gold2)}

/* ─── MAIN ─── */
#main-area{display:none;flex-direction:row}
#left-panel{
  width:172px;flex-shrink:0;
  background:var(--paper2);
  border-right:2px solid var(--gold);
  padding:12px;
  display:flex;flex-direction:column;gap:12px;
}
.p-box{
  background:var(--paper);
  border:1px solid rgba(201,168,76,0.7);
  padding:10px;
}
.p-head{
  font-family:'Ma Shan Zheng',serif;
  font-size:14px;color:var(--ink);
  letter-spacing:0.18em;
  border-bottom:1px solid rgba(201,168,76,0.5);
  padding-bottom:5px;margin-bottom:9px;
}
.color-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.csw{
  aspect-ratio:1;
  border:1.5px solid rgba(42,26,0,0.22);
  cursor:pointer;position:relative;
  transition:transform 0.1s;
}
.csw:hover{transform:scale(1.12);z-index:5}
.csw.sel::after{
  content:'';position:absolute;inset:0;
  border:2px solid var(--ink);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.5);
}

.b-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 8px;margin-bottom:5px;cursor:pointer;
  border:1px solid transparent;
  transition:all 0.12s;
}
.b-item:hover{background:rgba(201,168,76,0.18);border-color:rgba(201,168,76,0.6)}
.b-item.sel{background:var(--ink);border-color:var(--ink)}
.b-name{font-family:'ZCOOL XiaoWei',serif;font-size:12px;color:var(--ink2);letter-spacing:0.06em;line-height:1.4}
.b-item.sel .b-name{color:var(--paper2)}
.b-desc{font-size:10px;opacity:0.65}
.b-dot{width:20px;height:20px;border-radius:50%;background:var(--ink);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}

.maruo-box{text-align:center;padding:10px 0}
.maruo-boy{font-size:46px;display:block;animation:breathe 3.5s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.maruo-txt{font-family:'ZCOOL XiaoWei',serif;font-size:11px;color:var(--ink2);line-height:2;letter-spacing:0.08em;margin-top:4px}

/* ─── CANVAS AREA ─── */
#canvas-area{flex:1;padding:12px;display:flex;flex-direction:column;gap:10px;background:var(--paper)}
#task-box{
  background:rgba(201,168,76,0.1);
  border:1.5px solid var(--gold);
  border-left:5px solid var(--red);
  padding:10px 14px;
}
.task-label{
  font-family:'Ma Shan Zheng',serif;
  font-size:16px;color:var(--red);
  letter-spacing:0.18em;display:block;margin-bottom:3px;
}
.task-desc{
  font-family:'ZCOOL XiaoWei',serif;
  font-size:12px;color:var(--ink2);
  line-height:2;letter-spacing:0.08em;
}

/* ─── CANVAS WRAP ─── */
#canvas-wrap{
  position:relative;
  flex:1;min-height:330px;
  border:2px solid var(--ink);
  box-shadow:3px 3px 0 rgba(42,26,0,0.3),inset 0 0 40px rgba(42,26,0,0.07);
  overflow:hidden;cursor:crosshair;
  background:#f0ead8;
}
/* 橫向稿紙線 */
#canvas-wrap::before{
  content:'';position:absolute;inset:0;z-index:3;pointer-events:none;
  background:repeating-linear-gradient(
    0deg,transparent,transparent 31px,
    rgba(42,26,0,0.055) 31px,rgba(42,26,0,0.055) 32px
  );
}
/* 四角褪色磨損 */
#canvas-wrap::after{
  content:'';position:absolute;inset:0;z-index:4;pointer-events:none;
  background:
    radial-gradient(ellipse 80px 60px at 0% 0%,rgba(42,26,0,0.22) 0%,transparent 100%),
    radial-gradient(ellipse 60px 50px at 100% 0%,rgba(42,26,0,0.14) 0%,transparent 100%),
    radial-gradient(ellipse 70px 60px at 0% 100%,rgba(42,26,0,0.17) 0%,transparent 100%),
    radial-gradient(ellipse 90px 70px at 100% 100%,rgba(42,26,0,0.25) 0%,transparent 100%);
}
#drawing-canvas{display:block;position:absolute;inset:0;width:100%;height:100%}
#hint-wrap{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;pointer-events:none}
#hint-char{
  font-family:'Ma Shan Zheng',serif;
  font-size:160px;color:rgba(42,26,0,0.04);
  line-height:1;user-select:none;
}
#cv-label{
  position:absolute;top:8px;right:12px;z-index:5;
  font-family:'Ma Shan Zheng',serif;
  font-size:13px;color:rgba(42,26,0,0.3);
  letter-spacing:0.18em;pointer-events:none;
}
#stamp{
  position:absolute;bottom:10px;left:10px;z-index:5;
  width:46px;height:46px;border:2px solid rgba(155,32,32,0.28);
  display:flex;align-items:center;justify-content:center;
  font-family:'Ma Shan Zheng',serif;font-size:13px;
  color:rgba(155,32,32,0.32);text-align:center;line-height:1.3;
  transform:rotate(-14deg);pointer-events:none;
}

/* ─── RESULT OVERLAY ─── */
#result-overlay{
  display:none;position:absolute;inset:0;z-index:20;
  background:rgba(16,8,0,0.91);
  align-items:center;justify-content:center;
  flex-direction:column;text-align:center;padding:28px;
}
.res-boy{font-size:64px;margin-bottom:8px;animation:celeb 0.55s ease-in-out infinite alternate}
@keyframes celeb{0%{transform:rotate(-9deg) scale(0.94)}100%{transform:rotate(9deg) scale(1.06)}}
#res-title{
  font-family:'Ma Shan Zheng',serif;
  font-size:28px;color:#f5e6b0;
  letter-spacing:0.22em;margin-bottom:8px;
}
#res-stars{font-size:32px;letter-spacing:12px;margin-bottom:10px;color:#e8c96c}
#res-msg{
  font-family:'ZCOOL XiaoWei',serif;
  font-size:13px;color:#c8b880;
  line-height:2.4;margin-bottom:22px;
  white-space:pre-line;letter-spacing:0.1em;
  max-width:300px;
}
.res-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

/* ─── BOTTOM BTNS ─── */
#bottom-btns{display:flex;gap:9px;flex-wrap:wrap}

/* ─── FADE ─── */
.fade{animation:fadeUp 0.4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="game">
  <div class="deco-top"></div>

  <!-- ── 標題畫面 ── -->
  <div id="title-screen">
    <div class="title-frame">
      <span class="corner tl">❧</span>
      <span class="corner tr">❧</span>
      <span class="corner bl">❧</span>
      <span class="corner br">❧</span>
    </div>
    <span class="pen-anim">🖊️</span>
    <h1 class="title-zh">創意大師萬能筆</h1>
    <p class="title-jp">丸雄の物語 · 昭和の繪師</p>
    <div class="divider"><span></span><i>❧</i><span></span></div>
    <div class="title-story">
      千葉縣一間老屋的窗邊，<br>
      男孩丸雄握著一支神奇的筆——<br>
      筆尖所觸，世界便在紙上悄然誕生。<br>
      城堡、海浪、星空、花田……<br>
      <em>那不是畫出來的，是誕生出來的。</em>
    </div>
    <button class="ink-btn red" onclick="showStages()">開始遊戲</button>
  </div>

  <!-- ── 關卡選擇 ── -->
  <div id="stage-select">
    <div class="sec-title">選擇今日畫題</div>
    <div class="stage-grid" id="stage-grid"></div>
    <div style="text-align:center">
      <button class="ink-btn dim" onclick="backTitle()" style="font-size:13px;padding:9px 22px">← 返回標題</button>
    </div>
  </div>

  <!-- ── HUD ── -->
  <div id="hud">
    <span class="hud-item" id="hud-name">——</span>
    <span class="hud-item">得分：<strong id="score-v">0</strong></span>
    <span class="hud-item">剩餘：<strong id="time-v">60</strong> 秒</span>
  </div>

  <!-- ── 主遊戲 ── -->
  <div id="main-area">
    <div id="left-panel">
      <div class="p-box">
        <div class="p-head">顏料調色盤</div>
        <div class="color-grid" id="color-grid"></div>
      </div>
      <div class="p-box">
        <div class="p-head">筆刷工具</div>
        <div id="brush-list"></div>
      </div>
      <div class="p-box maruo-box">
        <span class="maruo-boy">🧒</span>
        <div class="maruo-txt">千葉縣的小繪師<br>丸　雄</div>
      </div>
    </div>

    <div id="canvas-area">
      <div id="task-box">
        <span class="task-label" id="task-lbl">【畫題】</span>
        <span class="task-desc" id="task-desc">載入中……</span>
      </div>
      <div id="canvas-wrap">
        <canvas id="drawing-canvas"></canvas>
        <div id="hint-wrap"><div id="hint-char"></div></div>
        <div id="cv-label"></div>
        <div id="stamp">丸<br>雄</div>
        <div id="result-overlay">
          <div class="res-boy">🧒</div>
          <h2 id="res-title">傑作誕生！</h2>
          <div id="res-stars">★★★</div>
          <p id="res-msg"></p>
          <div class="res-btns">
            <button class="ink-btn green" onclick="nextStage()">下一幅 ▶</button>
            <button class="ink-btn dim" onclick="showStages()">選擇畫題</button>
          </div>
        </div>
      </div>
      <div id="bottom-btns">
        <button class="ink-btn dim" onclick="clearC()" style="font-size:13px;padding:10px 18px">重新描繪</button>
        <button class="ink-btn blue" onclick="submit()" style="font-size:13px;padding:10px 18px">完成提交 ✓</button>
        <button class="ink-btn dim" onclick="showStages()" style="font-size:13px;padding:10px 18px">← 返回</button>
      </div>
    </div>
  </div>

  <div class="deco-top" style="transform:scaleX(-1)"></div>
</div>

<script>
const ST=[
  {id:0,name:'海の波濤',icon:'🌊',diff:'入門',
   colors:['#0d4f8b','#1a7abf','#5badd6','#a8d8ea','#e0f3fb','#f5c842','#2ecc71','#1a5276'],
   brushes:['鉛筆','水彩筆','太筆'],
   lbl:'海の波濤',desc:'用青色顏料，將大海的氣息注入畫紙之中。試著描繪洶湧的波浪吧。',
   hint:'海',time:90,bg:'#eef6fb'},
  {id:1,name:'秋山紅葉',icon:'🍂',diff:'初學',
   colors:['#c0392b','#e67e22','#f39c12','#d35400','#922b21','#6e2f1a','#27ae60','#784212'],
   brushes:['鉛筆','水彩筆','油彩筆'],
   lbl:'秋山紅葉',desc:'楓紅染透了千葉縣的山頭。用暖色系，描繪那秋意深濃的山景。',
   hint:'山',time:80,bg:'#fdf5e8'},
  {id:2,name:'夜空繁星',icon:'✨',diff:'普通',
   colors:['#0d1b4b','#1a2980','#7f8bcd','#f5e642','#ffffff','#e8c4d0','#7ec8e3','#9b59b6'],
   brushes:['鉛筆','細筆','水彩筆'],
   lbl:'夜空繁星',desc:'深夜的老屋窗外，星河傾瀉而下。在深藍的夜空中點亮每一顆星。',
   hint:'星',time:90,bg:'#0a0d2e'},
  {id:3,name:'田間花畑',icon:'🌸',diff:'普通',
   colors:['#e91e8c','#ff69b4','#dda0dd','#90ee90','#228b22','#f8bbd0','#ff5722','#ffeb3b'],
   brushes:['鉛筆','水彩筆','油彩筆','太筆'],
   lbl:'田間花畑',desc:'春天的田野色彩繽紛。讓萬能筆帶出那盛放的生命力！',
   hint:'花',time:120,bg:'#f0fff4'},
  {id:4,name:'港灣夕暮',icon:'🌇',diff:'困難',
   colors:['#e74c3c','#e67e22','#f4d03f','#85929e','#2c3e50','#fadbd8','#f0e6ff','#a04000'],
   brushes:['鉛筆','水彩筆','油彩筆','太筆','細筆'],
   lbl:'港灣夕暮',desc:'夕陽西下，漁船一艘艘返航。用暖橙色調描繪這溫柔的一刻。',
   hint:'夕',time:110,bg:'#fff5e6'},
  {id:5,name:'雪中城堡',icon:'🏯',diff:'困難',
   colors:['#ecf0f1','#bdc3c7','#7f8c8d','#2980b9','#1a5276','#f9e4b7','#a9cce3','#566573'],
   brushes:['鉛筆','細筆','水彩筆','油彩筆','太筆'],
   lbl:'雪中城堡',desc:'白雪覆蓋了古老的城郭。用冷色與白色，描繪那靜謐莊嚴的冬日。',
   hint:'城',time:120,bg:'#eef2ff'},
];

const BR={
  '鉛筆':{sz:2,op:1.0,ico:'✏️',desc:'細線精確'},
  '細筆':{sz:1,op:0.9,ico:'🖊️',desc:'描邊勾勒'},
  '水彩筆':{sz:8,op:0.35,ico:'🖌️',desc:'暈染透明'},
  '油彩筆':{sz:12,op:0.87,ico:'🖍️',desc:'厚塗覆蓋'},
  '太筆':{sz:18,op:0.62,ico:'🪣',desc:'大面塗色'},
};

let cur=null,col='#1a7abf',brush='鉛筆';
let dn=false,lx=0,ly=0,score=0,tid=null,tl=60,strk=0;

const $=id=>document.getElementById(id);
const show=id=>{$(id).style.display='block';$(id).classList.add('fade')};
const hide=id=>{$(id).style.display='none'};
const showF=id=>{$(id).style.display='flex';$(id).classList.add('fade')};

function backTitle(){hide('stage-select');show('title-screen');hide('hud');hide('main-area')}
function showStages(){
  hide('title-screen');hide('main-area');hide('hud');
  show('stage-select');
  const g=$('stage-grid');g.innerHTML='';
  ST.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='stage-card';
    d.innerHTML=`<span class="s-icon">${s.icon}</span><div class="s-name">${s.name}</div><div class="s-diff">${s.diff}</div>`;
    d.onclick=()=>go(i);g.appendChild(d);
  });
}
function go(i){
  cur=ST[i];
  hide('stage-select');hide('title-screen');
  $('hud').style.display='flex';
  $('main-area').style.display='flex';$('main-area').classList.add('fade');
  $('hud-name').textContent=`—— ${cur.name} ——`;
  score=0;strk=0;$('score-v').textContent='0';
  buildCols();buildBrushes();setupC();buildTask();startT();
}
function buildCols(){
  const g=$('color-grid');g.innerHTML='';
  col=cur.colors[0];
  cur.colors.forEach((c,i)=>{
    const s=document.createElement('div');
    s.className='csw'+(i===0?' sel':'');
    s.style.background=c;
    s.onclick=()=>{col=c;document.querySelectorAll('.csw').forEach(x=>x.classList.remove('sel'));s.classList.add('sel')};
    g.appendChild(s);
  });
}
function buildBrushes(){
  const l=$('brush-list');l.innerHTML='';
  brush=cur.brushes[0];
  cur.brushes.forEach((b,i)=>{
    const bd=BR[b];
    const d=document.createElement('div');
    d.className='b-item'+(i===0?' sel':'');
    const ds=Math.round(bd.sz*0.65+4);
    d.innerHTML=`<div class="b-dot" style="width:${ds}px;height:${ds}px">${bd.ico}</div><div class="b-name">${b}<div class="b-desc">${bd.desc}</div></div>`;
    d.onclick=()=>{brush=b;document.querySelectorAll('.b-item').forEach(x=>x.classList.remove('sel'));d.classList.add('sel')};
    l.appendChild(d);
  });
}
function setupC(){
  const wrap=$('canvas-wrap');
  const cv=$('drawing-canvas');
  $('result-overlay').style.display='none';
  const W=wrap.clientWidth;const H=Math.max(wrap.clientHeight,330);
  cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');
  ctx.fillStyle=cur.bg;ctx.fillRect(0,0,W,H);
  paperTex(ctx,W,H);
  $('hint-char').textContent=cur.hint;
  $('cv-label').textContent=cur.name;
  addEv(cv);
}
function paperTex(ctx,W,H){
  ctx.save();
  // 紙張細粒
  ctx.globalAlpha=0.14;
  ctx.fillStyle='#8b6914';
  for(let i=0;i<1200;i++){
    const x=Math.random()*W,y=Math.random()*H,r=Math.random()*1.4;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  }
  // 纖維橫線
  ctx.globalAlpha=0.04;
  ctx.strokeStyle='#5a3a10';ctx.lineWidth=0.5;
  for(let y=0;y<H;y+=1.6){
    ctx.beginPath();ctx.moveTo(0,y+Math.random()*0.6);ctx.lineTo(W,y+Math.random()*0.6);ctx.stroke();
  }
  // 淡淡水漬暈圈（模擬水彩紙）
  ctx.globalAlpha=0.03;
  for(let i=0;i<6;i++){
    const x=Math.random()*W,y=Math.random()*H,r=30+Math.random()*80;
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,'rgba(140,100,40,0)');
    g.addColorStop(0.7,'rgba(140,100,40,0.5)');
    g.addColorStop(1,'rgba(140,100,40,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}
function addEv(cv){
  cv.onmousedown=e=>{dn=true;[lx,ly]=pt(e,cv)};
  cv.onmousemove=e=>{if(!dn)return;mk(e,cv)};
  cv.onmouseup=()=>{dn=false;strk++;addSc(5)};
  cv.onmouseleave=()=>{dn=false};
  cv.ontouchstart=e=>{e.preventDefault();dn=true;[lx,ly]=pt(e.touches[0],cv)};
  cv.ontouchmove=e=>{e.preventDefault();if(!dn)return;mk(e.touches[0],cv)};
  cv.ontouchend=()=>{dn=false;strk++;addSc(5)};
}
function pt(e,cv){const r=cv.getBoundingClientRect();return[e.clientX-r.left,e.clientY-r.top]}
function mk(e,cv){
  const ctx=cv.getContext('2d');
  const[x,y]=pt(e,cv);
  const b=BR[brush];
  ctx.globalAlpha=b.op;
  ctx.strokeStyle=col;ctx.lineWidth=b.sz;
  ctx.lineCap='round';ctx.lineJoin='round';
  if(brush==='水彩筆'){
    // 主線
    ctx.beginPath();ctx.moveTo(lx+Math.random()*1.2,ly+Math.random()*1.2);ctx.lineTo(x+Math.random()*1.2,y+Math.random()*1.2);ctx.stroke();
    // 暈染外圈
    ctx.globalAlpha=b.op*0.22;ctx.lineWidth=b.sz*2.2;
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);ctx.stroke();
    // 細毛邊
    ctx.globalAlpha=b.op*0.12;ctx.lineWidth=b.sz*3.5;
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);ctx.stroke();
  } else if(brush==='油彩筆'){
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);ctx.stroke();
    // 厚塗紋理
    ctx.globalAlpha=b.op*0.18;ctx.lineWidth=b.sz*0.5;
    for(let i=0;i<3;i++){
      ctx.beginPath();ctx.moveTo(lx+Math.random()*3-1.5,ly+Math.random()*3-1.5);ctx.lineTo(x+Math.random()*3-1.5,y+Math.random()*3-1.5);ctx.stroke();
    }
  } else {
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);ctx.stroke();
  }
  ctx.globalAlpha=1;[lx,ly]=[x,y];
}
function buildTask(){$('task-lbl').textContent=`【畫題】${cur.lbl}`;$('task-desc').textContent=cur.desc}
function startT(){
  if(tid)clearInterval(tid);
  tl=cur.time;$('time-v').textContent=tl;
  tid=setInterval(()=>{tl--;$('time-v').textContent=tl;if(tl<=0){clearInterval(tid);submit()}},1000);
}
function addSc(n){score+=n;$('score-v').textContent=score}
function clearC(){
  const cv=$('drawing-canvas');const ctx=cv.getContext('2d');
  ctx.fillStyle=cur.bg;ctx.fillRect(0,0,cv.width,cv.height);
  paperTex(ctx,cv.width,cv.height);
  strk=0;score=0;$('score-v').textContent='0';
}
function submit(){
  if(tid)clearInterval(tid);
  const cv=$('drawing-canvas');const ctx=cv.getContext('2d');
  const d=ctx.getImageData(0,0,cv.width,cv.height).data;
  let p=0;const bg=h2r(cur.bg);
  for(let i=0;i<d.length;i+=4){
    if(Math.abs(d[i]-bg.r)>22||Math.abs(d[i+1]-bg.g)>22||Math.abs(d[i+2]-bg.b)>22)p++;
  }
  const cov=p/(cv.width*cv.height);
  const tb=Math.floor(tl*2),sb=Math.min(strk*4,80),cb=Math.floor(cov*650);
  const final=score+tb+sb+cb;
  let stars,title,msg;
  if(final>280){stars='★★★';title='傑作誕生！';msg=`丸雄的眼中閃著光芒——\n創意大師萬能筆的力量完全解放！\n\n得分：${final} 點\n時間獎勵：${tb} 點`;}
  else if(final>130){stars='★★☆';title='畫得不錯！';msg=`還差一點就能讓夢想完全綻放。\n繼續努力，丸雄！\n\n得分：${final} 點`;}
  else{stars='★☆☆';title='繼續練習！';msg=`筆握得越緊，夢想就越近。\n不要放棄，再畫一次！\n\n得分：${final} 點`;}
  $('res-title').textContent=title;$('res-stars').textContent=stars;$('res-msg').textContent=msg;
  const ov=$('result-overlay');ov.style.display='flex';ov.classList.add('fade');
}
function nextStage(){const i=ST.findIndex(s=>s.id===cur.id);go((i+1)%ST.length)}
function h2r(h){
  if(!h||h.length<7)return{r:238,g:246,b:251};
  return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};
}
</script>
