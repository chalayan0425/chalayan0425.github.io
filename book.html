<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>丸雄の筆と夢</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700&family=Noto+Serif+JP:wght@300;400;700&family=IM+Fell+English:ital@0;1&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --paper:#f2e7ce;
  --paper2:#e6d9b8;
  --paper3:#d9caa2;
  --ink:#18100a;
  --ink2:#4a3820;
  --red:#7a1414;
  --gold:#8a6420;
  --seam:#a07c30;
  --aged:#b89048;
}
html,body{
  background:#0e0a05;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding:24px 0;
}
#app{
  width:620px;
  position:relative;
  box-shadow:
    0 0 0 1px #3a2a0a,
    8px 8px 32px rgba(0,0,0,0.85),
    -3px 0 12px rgba(0,0,0,0.5);
}

/* ══ COVER ══ */
#coverDiv{
  width:620px;height:620px;
  position:relative;overflow:hidden;
  background:#120a02;cursor:pointer;
}
#coverImg{
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  display:block;transition:transform 0.6s ease;
}
#coverDiv:hover #coverImg{transform:scale(1.02);}
.cv{
  position:absolute;inset:0;
  background:
    linear-gradient(to bottom,transparent 38%,rgba(10,5,1,0.97) 85%),
    linear-gradient(to right,rgba(10,5,1,0.25),transparent 10%,transparent 90%,rgba(10,5,1,0.25));
  pointer-events:none;
}
.cover-bottom{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;
  padding:0 20px 32px;
}
.cover-ornament{
  font-family:"Shippori Mincho",serif;
  font-size:11px;letter-spacing:8px;
  color:rgba(180,144,72,0.6);margin-bottom:10px;
}
.cover-subtitle{
  font-family:"IM Fell English",serif;font-style:italic;
  font-size:12px;letter-spacing:2px;
  color:rgba(200,168,100,0.7);margin-bottom:5px;
}
.cover-author{
  font-family:"Shippori Mincho","Noto Serif JP",serif;
  font-size:10px;letter-spacing:4px;
  color:rgba(180,144,72,0.55);margin-bottom:20px;
}
.open-btn{
  font-family:"Shippori Mincho","Noto Serif JP",serif;
  font-size:13px;letter-spacing:6px;
  color:rgba(238,216,160,0.9);background:transparent;
  border:1px solid rgba(160,124,48,0.55);
  padding:10px 30px;cursor:pointer;transition:all 0.35s;position:relative;
}
.open-btn::before,.open-btn::after{
  content:"";position:absolute;top:50%;transform:translateY(-50%);
  width:6px;height:6px;border:1px solid rgba(180,144,72,0.5);border-radius:50%;
}
.open-btn::before{left:10px;} .open-btn::after{right:10px;}
.open-btn:hover{background:rgba(100,16,16,0.65);border-color:rgba(180,80,60,0.75);color:#f5e8c8;letter-spacing:7px;}

/* ══ BOOK ══ */
#bookDiv{
  display:none;flex-direction:column;
  width:620px;background:var(--paper);position:relative;
}
#bookDiv::before{
  content:"";position:absolute;top:0;left:0;bottom:0;width:5px;
  background:linear-gradient(to right,rgba(0,0,0,0.2),transparent);
  z-index:10;pointer-events:none;
}
#bookDiv::after{
  content:"";position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(to right,#5a0808,#9a2020 30%,#c03020 60%,#8a1010);
}

/* ══ TOOLBAR ══ */
.toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px 7px;
  background:var(--paper2);border-bottom:1px solid var(--seam);
  position:relative;z-index:5;margin-top:4px;
}
.toolbar-title{
  font-family:"Shippori Mincho","Noto Serif JP",serif;
  font-size:10px;letter-spacing:4px;color:var(--gold);opacity:0.8;
}
.ctrl{display:flex;gap:4px;align-items:center;}
.nav-btn{
  font-family:"Shippori Mincho","Noto Serif JP",serif;
  font-size:11px;letter-spacing:2px;color:var(--ink2);
  background:transparent;border:1px solid var(--aged);
  padding:4px 10px;cursor:pointer;transition:all 0.2s;
}
.nav-btn:hover{background:var(--red);color:var(--paper);border-color:var(--red);}
.nav-btn:disabled{opacity:0.25;cursor:default;pointer-events:none;}
.pg-ind{
  font-family:"Shippori Mincho","Noto Serif JP",serif;
  font-size:11px;letter-spacing:2px;color:var(--gold);
  min-width:50px;text-align:center;
}

/* ══ LANG SEALS ══ */
.lang-group{display:flex;gap:5px;align-items:center;}
.lang-seal{cursor:pointer;border:none;padding:0;background:transparent;transition:all 0.2s;}
.seal-body{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:42px;height:42px;
  border:1.5px solid var(--aged);background:var(--paper3);
  position:relative;transition:all 0.22s;
}
.seal-body::before{content:"";position:absolute;inset:4px;border:0.5px solid rgba(160,124,48,0.35);}
.seal-body::after{content:"";position:absolute;top:3px;right:3px;width:5px;height:5px;border-top:0.5px solid rgba(160,124,48,0.4);border-right:0.5px solid rgba(160,124,48,0.4);}
.seal-main{font-family:"Shippori Mincho","Noto Serif JP",serif;font-size:15px;font-weight:700;color:var(--ink2);line-height:1;position:relative;z-index:1;}
.seal-kana{font-family:"Shippori Mincho","Noto Serif JP",serif;font-size:7.5px;letter-spacing:0.5px;color:var(--gold);margin-top:2px;position:relative;z-index:1;}
.lang-seal.active .seal-body{background:var(--red);border-color:#5a0808;}
.lang-seal.active .seal-main{color:#f5e0c0;}
.lang-seal.active .seal-kana{color:rgba(245,224,192,0.65);}
.lang-seal.active .seal-body::before{border-color:rgba(245,200,150,0.25);}
.lang-seal.active .seal-body::after{border-color:rgba(245,200,150,0.3);}
.lang-seal:hover:not(.active) .seal-body{background:var(--paper2);border-color:var(--seam);}

/* ══ SPREAD ══ */
.spread{
  display:grid;grid-template-columns:1fr 1fr;
  width:620px;height:578px;
}

/* TEXT SIDE */
.text-page{
  padding:34px 26px 32px 30px;
  border-right:1.5px solid var(--seam);
  position:relative;display:flex;flex-direction:column;justify-content:center;
  background:var(--paper);overflow:hidden;
}
.text-page::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background-image:repeating-linear-gradient(
    0deg,transparent,transparent 28px,
    rgba(160,124,48,0.1) 28px,rgba(160,124,48,0.1) 29px
  );
}
.text-page::after{
  content:"";position:absolute;bottom:0;right:0;
  width:20px;height:20px;
  background:linear-gradient(135deg,var(--paper2) 50%,transparent 50%);
}

/* IMAGE SIDE — with padding & contain */
.img-page{
  position:relative;
  background:var(--paper);  /* same paper color for whitespace */
  display:flex;align-items:center;justify-content:center;
  padding:20px 18px;        /* breathing room all around */
  overflow:hidden;
}
/* subtle inner border frame */
.img-page::before{
  content:"";
  position:absolute;
  inset:10px;
  border:1px solid rgba(160,124,48,0.2);
  pointer-events:none;
  z-index:2;
}
/* aged texture overlay */
.img-page::after{
  content:"";position:absolute;inset:0;pointer-events:none;
  background-image:repeating-linear-gradient(
    0deg,transparent,transparent 28px,
    rgba(160,124,48,0.04) 28px,rgba(160,124,48,0.04) 29px
  );
  z-index:1;
}
.img-page img{
  max-width:100%;
  max-height:100%;
  width:auto;
  height:auto;
  object-fit:contain;      /* NEVER crop — show full image */
  display:block;
  filter:sepia(12%) contrast(0.95) brightness(0.97) saturate(0.9);
  position:relative;z-index:0;
  box-shadow:
    0 2px 8px rgba(80,50,10,0.18),
    0 0 0 0.5px rgba(160,124,48,0.15);
}
.img-cap{
  position:absolute;bottom:14px;right:12px;
  font-family:"Shippori Mincho","Noto Serif JP",serif;
  font-size:9px;letter-spacing:3px;
  color:rgba(100,70,20,0.55);
  writing-mode:vertical-rl;
  z-index:3;
}

/* text content */
.pg-label{font-family:"Shippori Mincho","Noto Serif JP",serif;font-size:9px;letter-spacing:5px;color:var(--gold);margin-bottom:12px;opacity:0.7;}
.pg-title{font-family:"Shippori Mincho","Noto Serif JP","Noto Serif TC",serif;font-size:17px;font-weight:700;color:var(--ink);line-height:1.45;letter-spacing:1.5px;margin-bottom:4px;}
.pg-sub{font-family:"IM Fell English",serif;font-style:italic;font-size:10.5px;color:var(--red);margin-bottom:18px;opacity:0.8;}
.pg-rule{display:flex;align-items:center;gap:6px;margin-bottom:16px;}
.pg-rule::before{content:"";flex:none;width:24px;height:1px;background:var(--seam);}
.pg-rule::after{content:"◈";font-size:8px;color:var(--aged);opacity:0.55;}
.stanza{margin-bottom:13px;padding-left:11px;border-left:1.5px solid transparent;}
.stanza.accent{border-left-color:var(--red);}
.line{display:block;font-family:"Shippori Mincho","Noto Serif JP","Noto Serif TC",serif;font-size:12px;line-height:2.0;color:var(--ink);letter-spacing:0.5px;}
.line.em{color:var(--red);font-weight:700;}
.pg-num{margin-top:auto;padding-top:14px;font-family:"Shippori Mincho","Noto Serif JP",serif;font-size:9px;letter-spacing:3px;color:var(--gold);opacity:0.48;}

/* ══ END PAGE ══ */
.end-page{
  width:620px;height:578px;
  display:flex;
  background:var(--paper);position:relative;overflow:hidden;
}
/* ruled lines on end page too */
.end-page::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background-image:repeating-linear-gradient(
    0deg,transparent,transparent 28px,
    rgba(160,124,48,0.08) 28px,rgba(160,124,48,0.08) 29px
  );
  z-index:0;
}
/* LEFT: colophon text */
.end-left{
  width:50%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:36px 24px;
  border-right:1.5px solid var(--seam);
  position:relative;z-index:1;
}
.hanko{
  width:78px;height:78px;
  border:2.5px solid var(--red);
  display:flex;align-items:center;justify-content:center;
  transform:rotate(-7deg);
  margin-bottom:22px;
  position:relative;
  background:rgba(122,20,20,0.04);
}
.hanko::before{content:"";position:absolute;inset:5px;border:0.5px solid rgba(122,20,20,0.25);}
.hanko-txt{
  font-family:"Shippori Mincho","Noto Serif JP",serif;
  font-size:25px;font-weight:700;color:var(--red);
  writing-mode:vertical-rl;letter-spacing:4px;
}
.end-deco{
  font-family:"Shippori Mincho","Noto Serif JP",serif;
  font-size:9px;letter-spacing:7px;
  color:var(--gold);margin-bottom:16px;opacity:0.6;
}
.end-rule{
  width:100px;height:1px;
  background:linear-gradient(to right,transparent,var(--aged),transparent);
  margin:12px auto;
}
.end-note{
  font-family:"Shippori Mincho","Noto Serif JP","Noto Serif TC",serif;
  font-size:11.5px;letter-spacing:1.5px;
  color:var(--ink2);text-align:center;
  line-height:2.4;white-space:pre-line;
  max-width:220px;
}

/* RIGHT: pen illustration with padding */
.end-right{
  width:50%;
  display:flex;align-items:center;justify-content:center;
  padding:22px 18px;
  position:relative;z-index:1;
}
.end-right::before{
  content:"";position:absolute;inset:12px;
  border:1px solid rgba(160,124,48,0.18);
  pointer-events:none;
}
.end-pen-img{
  max-width:100%;
  max-height:100%;
  width:auto;height:auto;
  object-fit:contain;
  display:block;
  filter:sepia(10%) contrast(0.96) brightness(0.98);
}
</style>
</head>

var PAGES=[{"secZh": "第一章", "secEn": "Chapter I", "secJa": "第一章", "tZh": "窗邊的光", "tEn": "Light Through the Window", "tJa": "窓辺の光", "cap": "千葉の老屋 1986", "stanzas": [{"lines": [{"zh": "在千葉縣的一間老屋裡，", "en": "In an old house in Chiba,", "ja": "千葉県の古い家で、"}, {"zh": "丸雄從小由奶奶撫養長大。", "en": "Maruo was raised by his grandmother.", "ja": "丸雄は祖母に育てられた。"}, {"zh": "窗邊的光總是斜斜地照進來，", "en": "The window light always fell at a slant,", "ja": "窓の光はいつも斜めで、"}]}, {"accent": true, "lines": [{"zh": "他用已經削到短短的鉛筆，", "en": "with a pencil worn to a stub,", "ja": "短く削れた鉛筆で、"}, {"zh": "在泛黃的紙上，一筆一筆描出世界。", "en": "he drew the world onto yellowed paper.", "ja": "黄ばんだ紙に世界を描いた。"}, {"zh": "城堡、海、還有他從未去過的遠方。", "en": "Castles, oceans, the faraway unseen.", "ja": "城、海、見たことのない遠い場所を。", "em": true}]}]}, {"secZh": "第二章", "secEn": "Chapter II", "secJa": "第二章", "tZh": "現實的重量", "tEn": "The Weight of Reality", "tJa": "現実の重さ", "cap": "夕陽の丘 1987", "stanzas": [{"lines": [{"zh": "在學校，他總是第一名。", "en": "At school, he always ranked first.", "ja": "学校ではいつも一番だった。"}, {"zh": "但回到家，畫紙得反覆擦寫，", "en": "But at home, paper was erased again and again.", "ja": "でも家では紙を何度も消し直した。"}, {"zh": "顏料，是他從來不敢奢望的東西。", "en": "Paint was something he never dared to want.", "ja": "絵の具は望んではいけないものだった。"}]}, {"accent": true, "lines": [{"zh": "他不是不想畫，", "en": "It was not that he did not wish to create.", "ja": "描きたくないわけではなかった。"}, {"zh": "只是現實，比夢想還要沉。", "en": "Only that reality weighed more than dreams.", "ja": "ただ現実は夢より重かった。", "em": true}]}]}, {"secZh": "第三章", "secEn": "Chapter III", "secJa": "第三章", "tZh": "誕生", "tEn": "Born", "tJa": "誕生", "cap": "黑夜と筆の光", "stanzas": [{"lines": [{"zh": "他試著輕聲說——", "en": "He whispered softly —", "ja": "彼はそっとつぶやいた——"}, {"zh": "「幫我畫一片海。」", "en": "Draw me an ocean.", "ja": "海を描いて。"}, {"zh": "筆尖輕觸紙面。", "en": "The nib touched the paper.", "ja": "ペン先が紙に触れた。"}]}, {"accent": true, "lines": [{"zh": "下一秒，藍色像水一樣暈開，", "en": "Blue spread like water,", "ja": "青が水のように広がり、"}, {"zh": "陽光在波浪上閃動，", "en": "sunlight shimmered on the waves,", "ja": "波の上で陽光が輝き、"}, {"zh": "一艘小船，緩緩出現。", "en": "a small boat slowly appeared.", "ja": "小舟がゆっくりと現れた。", "em": true}]}]}, {"secZh": "第四章", "secEn": "Chapter IV", "secJa": "第四章", "tZh": "第一名的秘密", "tEn": "The Secret of First Place", "tJa": "一番の秘密", "cap": "教室の午後", "stanzas": [{"lines": [{"zh": "在學校的牆上，貼滿了別人的畫。", "en": "The walls were covered with other paintings.", "ja": "壁にはほかの子の絵が並んでいた。"}, {"zh": "丸雄站在中間，懷抱著厚厚的素描稿，", "en": "Maruo stood among them, clutching his sketches,", "ja": "丸雄はその中に立ちスケッチを抱えながら、"}, {"zh": "眼神清澈，卻望著更遠的地方。", "en": "clear eyes fixed on something far beyond.", "ja": "澄んだ目でもっと遠くを見ていた。"}]}, {"accent": true, "lines": [{"zh": "他們看見的是第一名，", "en": "They saw first place.", "ja": "みんなには一番が見えていた。"}, {"zh": "他藏著的，是無數個夜晚的鉛筆聲。", "en": "He kept the sound of pencil on paper, every night.", "ja": "彼が隠していたのは夜ごとの鉛筆の音だった。", "em": true}]}]}, {"secZh": "第五章", "secEn": "Chapter V", "secJa": "第五章", "tZh": "那支筆的重量", "tEn": "The Weight of That Pen", "tJa": "あのペンの重さ", "cap": "叔父からの贈り物", "stanzas": [{"lines": [{"zh": "來自東京的叔叔，", "en": "An uncle came from Tokyo", "ja": "東京からおじさんがやってきて、"}, {"zh": "遞給他一支沉甸甸的筆。", "en": "and placed a heavy pen in his hands.", "ja": "重いペンを彼の手に渡した。"}, {"zh": "筆身微微發亮，像藏著什麼祕密。", "en": "It shimmered faintly, hiding a secret.", "ja": "かすかに輝き秘密を宿しているようだった。"}]}, {"accent": true, "lines": [{"zh": "上頭寫著——「創意大師萬能筆」。", "en": "The All-Capable Master Pen.", "ja": "創意大師万能筆と刻まれていた。", "em": true}, {"zh": "丸雄握在手裡的那一刻，", "en": "The moment Maruo held it,", "ja": "丸雄がそれを握った瞬間、"}, {"zh": "沒有說話，只是靜靜地看著。", "en": "he said nothing — only looked in silence.", "ja": "言葉もなくただ静かに見つめた。"}]}]}, {"secZh": "第六章", "secEn": "Chapter VI", "secJa": "第六章", "tZh": "被允許存在的世界", "tEn": "A World Allowed to Exist", "tJa": "存在を許された世界", "cap": "万能の光の中で", "stanzas": [{"lines": [{"zh": "接著，是城堡、是黃昏、是遠方的風。", "en": "Then castles, dusk, the wind from far away.", "ja": "城、夕暮れ、遠くの風が続いた。"}, {"zh": "素描、水彩、油畫——", "en": "Sketches, watercolour, oil —", "ja": "鉛筆画、水彩、油絵——"}, {"zh": "他從未擁有的一切，在他手中流動。", "en": "everything he never owned flowed through his hands.", "ja": "持っていなかったすべてが手の中を流れた。"}]}, {"accent": true, "lines": [{"zh": "那一刻，不是筆改變了世界。", "en": "It was not the pen that changed the world.", "ja": "世界を変えたのはペンではなかった。"}, {"zh": "是他的世界，終於被允許存在。", "en": "His world was finally allowed to exist.", "ja": "彼の世界がついに存在を許されたのだ。", "em": true}]}]}, {"secZh": "第七章", "secEn": "Chapter VII", "secJa": "第七章", "tZh": "奶奶與老屋", "tEn": "Grandmother and the Old House", "tJa": "祖母と古い家", "cap": "老家の記憶", "stanzas": [{"lines": [{"zh": "每當夜深，奶奶的燈還亮著，", "en": "Late each night, grandmother's lamp still burned.", "ja": "夜が更けても祖母の灯りは灯っていた。"}, {"zh": "她不問他畫的是什麼，", "en": "She never asked what he was drawing.", "ja": "何を描いているかとは聞かなかった。"}, {"zh": "只是輕輕地，把他的鉛筆放回桌上。", "en": "She only quietly returned his pencil to the desk.", "ja": "そっと鉛筆を机の上に戻すだけだった。"}]}, {"accent": true, "lines": [{"zh": "有些愛，不用說出來。", "en": "Some love needs no words.", "ja": "言葉にしなくていい愛がある。", "em": true}, {"zh": "它藏在斜斜的光裡，", "en": "It lives in the slant of light,", "ja": "斜めの光の中に宿り、"}, {"zh": "藏在一支捨不得丟的短鉛筆裡。", "en": "in a worn pencil too dear to throw away.", "ja": "捨てられない短い鉛筆の中に潜んでいる。"}]}]}, {"secZh": "第八章", "secEn": "Chapter VIII", "secJa": "第八章", "tZh": "那不是畫出來的", "tEn": "Not Drawn, but Born", "tJa": "描かれたのではなく生まれた", "cap": "波と夢", "stanzas": [{"lines": [{"zh": "那不是畫出來的。", "en": "It was not drawn.", "ja": "それは描かれたのではなかった。", "em": true}, {"zh": "那是「誕生」出來的。", "en": "It was born.", "ja": "それは誕生したのだ。"}, {"zh": "他愣住了，", "en": "He stood motionless,", "ja": "彼は立ち尽くし、"}]}, {"accent": true, "lines": [{"zh": "眼睛裡的光，比畫還亮。", "en": "the light in his eyes outshone the painting.", "ja": "その目の輝きは絵よりも明るかった。", "em": true}, {"zh": "他從來不知道，", "en": "He had never known", "ja": "知らなかったのだ、"}, {"zh": "原來夢想，可以這樣發光。", "en": "that a dream could shine like this.", "ja": "夢がこんなにも輝けることを。"}]}]}, {"secZh": "第九章", "secEn": "Chapter IX", "secJa": "第九章", "tZh": "浮起來", "tEn": "Rising", "tJa": "浮かび上がる", "cap": "夢想家の記憶", "stanzas": [{"lines": [{"zh": "丸雄低下頭，緊緊握住那支筆。", "en": "Maruo bowed his head and gripped the pen.", "ja": "丸雄は頭を下げペンを握り締めた。"}, {"zh": "那些曾經因為現實而沉下去的夢，", "en": "The dreams that had sunk beneath reality", "ja": "現実の下に沈んでいた夢たちが、"}, {"zh": "開始一點一點，重新浮起來。", "en": "began, little by little, to surface again.", "ja": "少しずつ浮かび上がってきた。"}]}, {"accent": true, "lines": [{"zh": "在光裡。", "en": "Into the light.", "ja": "光の中へ。", "em": true}]}]}, {"secZh": "後記", "secEn": "Epilogue", "secJa": "後記", "tZh": "如果你也有一支筆", "tEn": "If You Too Hold a Pen", "tJa": "あなたにもペンがあるなら", "cap": "万能の筆", "stanzas": [{"lines": [{"zh": "每個孩子，都有一個丸雄的角落，", "en": "Every child has a corner like Maruo's,", "ja": "どんな子にも丸雄のような場所がある。"}, {"zh": "窗邊的光，削短的鉛筆，", "en": "the slanting light, the worn pencil,", "ja": "窓辺の光、短くなった鉛筆、"}, {"zh": "以及那些從未說出口的遠方。", "en": "and faraway places never spoken aloud.", "ja": "口にしたことのない遠い場所。"}]}, {"accent": true, "lines": [{"zh": "但只要你還握著那支筆，", "en": "But as long as you still hold that pen,", "ja": "でもまだそのペンを握っているなら、"}, {"zh": "你的世界，就還有機會發光。", "en": "your world still has a chance to shine.", "ja": "あなたの世界はまだ輝ける。", "em": true}]}]}];

var KN=['一','二','三','四','五','六','七','八','九','十','十一'];
var cur=0,lang='zh',total=11;

function openBook(){
  document.getElementById('coverDiv').style.display='none';
  document.getElementById('bookDiv').style.display='flex';
  render();
}
function setLang(l){
  lang=l;
  ['btnZh','btnEn','btnJa'].forEach(function(id){document.getElementById(id).classList.remove('active');});
  document.getElementById(l==='zh'?'btnZh':l==='en'?'btnEn':'btnJa').classList.add('active');
  render();
}
function go(d){
  cur=Math.max(0,Math.min(total-1,cur+d));
  render();
  window.scrollTo(0,0);
}
function render(){
  document.getElementById('bPrev').disabled=(cur===0);
  document.getElementById('bNext').disabled=(cur>=total-1);
  document.getElementById('pgInd').textContent=KN[cur]+'/十一';
  var area=document.getElementById('pageArea');

  if(cur>=PAGES.length){
    /* END PAGE */
    var notes={
      zh:'丸雄的筆，從未停下。\n他的世界，一直在光裡。',
      en:"Maruo's pen never stopped.\nHis world lives on, in the light.",
      ja:'丸雄のペンは止まらなかった。\n彼の世界はいつも光の中にある。'
    };
    area.innerHTML=
      '<div class="end-page">'+
        '<div class="end-left">'+
          '<div class="hanko"><div class="hanko-txt">完</div></div>'+
          '<div class="end-deco">終 · FIN · 終わり</div>'+
          '<div class="end-rule"></div>'+
          '<div class="end-note">'+notes[lang]+'</div>'+
        '</div>'+
        '<div class="end-right">'+
          '<img class="end-pen-img" src="'+PEN_SRC+'" alt="創意大師萬能筆">'+
        '</div>'+
      '</div>';
    return;
  }

  /* NORMAL PAGE */
  var p=PAGES[cur];
  var imgSrc=IMGS[PIMGS[String(cur)]];
  var sec=lang==='zh'?p.secZh:lang==='en'?p.secEn:p.secJa;
  var title=lang==='zh'?p.tZh:lang==='en'?p.tEn:p.tJa;
  var sub=lang==='zh'?p.tJa:lang==='en'?p.tZh:p.tEn;
  var st='';
  p.stanzas.forEach(function(s){
    st+='<div class="stanza'+(s.accent?' accent':'')+'">';
    s.lines.forEach(function(l){
      var t=lang==='zh'?l.zh:lang==='en'?l.en:l.ja;
      st+='<span class="line'+(l.em?' em':'')+'">'+t+'</span>';
    });
    st+='</div>';
  });
  area.innerHTML=
    '<div class="spread">'+
      '<div class="text-page">'+
        '<div class="pg-label">'+sec+'</div>'+
        '<div class="pg-title">'+title+'</div>'+
        '<div class="pg-sub">'+sub+'</div>'+
        '<div class="pg-rule"></div>'+
        st+
        '<div class="pg-num">第'+KN[cur]+'頁</div>'+
      '</div>'+
      '<div class="img-page">'+
        '<img src="'+imgSrc+'" alt="'+title+'">'+
        '<div class="img-cap">'+p.cap+'</div>'+
      '</div>'+
    '</div>';
}
</script>
